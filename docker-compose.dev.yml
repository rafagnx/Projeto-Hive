version: '3.8'

services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  minio:
    extends:
      file: docker-compose.yml
      service: minio

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: instapost-api-dev
    ports:
      - '3001:3001'
    volumes:
      - ./packages/api/src:/app/packages/api/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: instapost-web-dev
    ports:
      - '3000:3000'
    volumes:
      - ./packages/web/src:/app/packages/web/src
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    container_name: instapost-bot-dev
    volumes:
      - ./packages/bot/src:/app/packages/bot/src
    depends_on:
      - api
    env_file: .env
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    container_name: instapost-mcp-dev
    ports:
      - '3002:3002'
    volumes:
      - ./packages/mcp/src:/app/packages/mcp/src
    depends_on:
      - api
    env_file: .env
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
